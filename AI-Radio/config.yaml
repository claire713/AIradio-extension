encoder_mapping:
  encoder1: ChillRadio
  encoder2: LocalTunes
  type: 1 #1 = single button encoder... 

pin_mapping:
  enc_A_clk: 3 #GPIO3 (Physical Pin 5)
  enc_A_dir: 4 #GPIO4 (Physical Pin 7)
  enc_A_sw:  21 #GPIO21 (Physical Pin 40) (optional)

  enc_B_clk: 14 #GPIO14 (Physical Pin 8) 
  enc_B_dir: 15 #GPIO15 (Physical Pin 10)
  enc_B_sw:  26 #GPIO26 (Physical Pin 37) (optional)

settings:
  volume: 90%
  magic_com: /dev/ttyACM0
  image: images/vradio_banner.bmp






