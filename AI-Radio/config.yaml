  - name: AI_DJ
    class: channels.local_mp3_player.LocalMP3Channel
    auto_start: false
    magic_colour: 0xF0ff
    button: D
    requires_internet: false
    audio_dir: audio/ai_dj
    image: images/main_banner.bmp



  - name: AIPodCasts
    class: channels.local_mp3_player.LocalMP3Channel
    auto_start: false
    magic_colour: 0xF000
    button: E
    requires_internet: false
    image: images/oasis_banner.bmp
    audio_dir: audio/ai_pods
    filename: Oasis__Gen_Z.m4a

  - name: TedLocalTunes
    class: channels.local_mp3_player_ted.LocalMP3Channel
    auto_start: false
    magic_colour: 0x1F
    button: F
    requires_internet: false
    image: images/sor_banner_draft.bmp
    filename: theblame.mp3

  - name: Local
    class: channels.local.Local
    magic_colour: 0xFFF
    auto_start: false
    button: L
    requires_internet: false
    audio_dir: audio/ai_seg
    llm_model: "llama3.2:3b"
    device_address:
      - "F7:7D:A1:5F:95:D7"
      - "FD:37:9B:E6:BA:0A"
      - "C8:93:B5:41:F9:DA"
    ble_scan_interval: 5.0
    ble_reconnect_delay: 0.7
    device_address:
      - "F7:7D:A1:5F:95:D7"
      - "FD:37:9B:E6:BA:0A"
      - "C8:93:B5:41:F9:DA"
    upbeat_songs:
      - "upb3.wav"
      - "upb2.wav"
      - "upb1.wav"
    relax_songs:
      - "rel3.wav"
      - "rel2.wav"
      - "rel1.wav"
 
  - name: Cloud
    class: channels.cloud.Cloud
    magic_colour: 0xFFF
    auto_start: false
    button: C
    requires_internet: True
    audio_dir: audio/ai_seg
    cloud_model: "gpt-4.1"
    tts_model: "gpt-4o-mini-tts"
    device_address:
      - "F7:7D:A1:5F:95:D7"
      - "FD:37:9B:E6:BA:0A"
      - "C8:93:B5:41:F9:DA"
    ble_scan_interval: 5.0
    ble_reconnect_delay: 0.7
    upbeat_songs:
      - "upb1.wav"
      - "upb2.wav"
      - "upb3.wav"
    relax_songs:
      - "rel1.wav"
      - "rel2.wav"
      - "rel3.wav"
    chill_voice: "nova"
    upbeat_voice: "fable"




